naftiko: 1.0.0-alpha2
info:
  label: Hotglue API V2 — Connector Metadata
  description: 'Hotglue API V2 — Connector Metadata. 2 operations. Lead operation: Retrieve available connectors. Self-contained
    Naftiko capability covering one Hotglue business surface.'
  tags:
  - Hotglue
  - Connector Metadata
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HOTGLUE_API_KEY: HOTGLUE_API_KEY
capability:
  consumes:
  - type: http
    namespace: hotglue-connector-metadata
    baseUri: https://api.hotglue.com
    description: Hotglue API V2 — Connector Metadata business capability. Self-contained, no shared references.
    resources:
    - name: v2-env_id-availableConnectors
      path: /v2/{env_id}/availableConnectors
      operations:
      - name: listavailableconnectors
        method: GET
        description: Retrieve available connectors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-env_id-flow_id-supportedConnectors
      path: /v2/{env_id}/{flow_id}/supportedConnectors
      operations:
      - name: listsupportedconnectors
        method: GET
        description: Retrieve supported connectors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.HOTGLUE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hotglue-connector-metadata-rest
    port: 8080
    description: REST adapter for Hotglue API V2 — Connector Metadata. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/{env-id}/availableconnectors
      name: v2-env-id-availableconnectors
      description: REST surface for v2-env_id-availableConnectors.
      operations:
      - method: GET
        name: listavailableconnectors
        description: Retrieve available connectors
        call: hotglue-connector-metadata.listavailableconnectors
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/{env-id}/{flow-id}/supportedconnectors
      name: v2-env-id-flow-id-supportedconnectors
      description: REST surface for v2-env_id-flow_id-supportedConnectors.
      operations:
      - method: GET
        name: listsupportedconnectors
        description: Retrieve supported connectors
        call: hotglue-connector-metadata.listsupportedconnectors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hotglue-connector-metadata-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hotglue API V2 — Connector Metadata. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: retrieve-available-connectors
      description: Retrieve available connectors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hotglue-connector-metadata.listavailableconnectors
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-supported-connectors
      description: Retrieve supported connectors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hotglue-connector-metadata.listsupportedconnectors
      outputParameters:
      - type: object
        mapping: $.

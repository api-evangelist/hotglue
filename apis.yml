aid: hotglue
name: Hotglue
description: >-
  Hotglue is an embedded iPaaS platform that enables SaaS products to offer
  native integrations to their customers. Built on the Python ecosystem, it
  provides a code-first approach with over 600 open-source connectors, a CLI
  for programmatic configuration management, detailed job logs, webhooks,
  and observability integrations. Hotglue allows developers to build flexible,
  scalable integrations without the lock-in of traditional iPaaS tools.
